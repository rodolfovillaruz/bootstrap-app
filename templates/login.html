<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Bootstrap App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .logo { font-size: 2rem; margin-bottom: 1rem; }
    h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: .4rem; }
    p  { font-size: .85rem; color: #666; margin-bottom: 2rem; }

    #sign-in-btn {
      display: inline-flex;
      align-items: center;
      gap: .75rem;
      background: #fff;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: .65rem 1.4rem;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
      color: #1a1a2e;
    }
    #sign-in-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); border-color: #bbb; }
    #sign-in-btn:disabled { opacity: .5; cursor: not-allowed; }
    #sign-in-btn svg { flex-shrink: 0; }

    #error {
      margin-top: 1.2rem;
      font-size: .82rem;
      color: #c62828;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">⚡</div>
  <h1>Bootstrap App</h1>
  <p>Sign in with your Google account to continue.</p>

  <button id="sign-in-btn">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Sign in with Google
  </button>

  <div id="error"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = JSON.parse(document.currentScript?.dataset?.config || "{}");

  // Config is injected via a separate script tag below
  const app = initializeApp(window.__FIREBASE_CONFIG__);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  document.getElementById("sign-in-btn").addEventListener("click", async () => {
    const btn = document.getElementById("sign-in-btn");
    const errorEl = document.getElementById("error");
    btn.disabled = true;
    errorEl.style.display = "none";

    try {
      const result = await signInWithPopup(auth, provider);
      const idToken = await result.user.getIdToken();

      const res = await fetch("/auth/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ idToken }),
      });

      if (res.ok) {
        window.location.href = "/";
      } else {
        const data = await res.json();
        errorEl.textContent = data.error || "Sign-in failed. Try again.";
        errorEl.style.display = "block";
        btn.disabled = false;
      }
    } catch (err) {
      errorEl.textContent = err.message || "Sign-in failed. Try again.";
      errorEl.style.display = "block";
      btn.disabled = false;
    }
  });
</script>

<script>
  // Firebase config injected server-side via template
  window.__FIREBASE_CONFIG__ = {{ firebase_config | tojson }};
</script>

</body>
</html>
